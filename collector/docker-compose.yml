services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: tok
      POSTGRES_PASSWORD: tok
      POSTGRES_DB: tokleaderboard
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U tok"]
      interval: 5s
      timeout: 3s
      retries: 10

  collector:
    build: .
    env_file: .env
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "8088:8088"
    command: uvicorn app:app --host 0.0.0.0 --port 8088

  # 可选进阶看板。MVP 直接看 collector 的 / 自带看板即可；这里自动挂好数据源+面板。
  # 若复用你现有 Grafana，可删掉这个 service。
  grafana:
    image: grafana/grafana:11.4.0
    ports:
      - "3000:3000"
    environment:
      GF_SECURITY_ADMIN_PASSWORD: admin
    volumes:
      - grafdata:/var/lib/grafana
      - ./grafana/provisioning:/etc/grafana/provisioning
      - ../dashboard:/var/lib/grafana/dashboards

volumes:
  pgdata:
  grafdata:
