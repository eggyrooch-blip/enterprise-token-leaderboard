<!doctype html>
<html lang="zh-CN">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>AI 编程 Token 看板 · Keep</title>
<!-- 浏览器标签页 favicon：品牌色圆角方块 + 白色首字母(与顶栏 brand-mark 一致)。内联 SVG 保证一定渲染。 -->
<link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg%20xmlns='http://www.w3.org/2000/svg'%20viewBox='0%200%2032%2032'%3E%3Crect%20width='32'%20height='32'%20rx='9'%20fill='%2324C789'/%3E%3Ctext%20x='16'%20y='23'%20font-family='Arial,Helvetica,sans-serif'%20font-size='21'%20font-weight='800'%20fill='white'%20text-anchor='middle'%3EE%3C/text%3E%3C/svg%3E">
<style>
  /* 展示字体(数字视觉锤:KPI 大数 / 排名 / 榜单数字)。缺省走系统字体,可换装你自己的展示字体。 */


  :root{
    --green:#24C789; --green-bd:#A2F2D1; --green-soft:#E0FDF0; --purple:#3A3340; --purple-700:#584F60;
    --ink:#000; --t1:#333; --t2:#666; --t3:#999; --t4:#CCC; --div:#F2F2F2; --bg:#F7F7F7; --bg2:#FAFAFA;
    --font:"PingFang SC","Noto Sans SC",-apple-system,"Helvetica Neue","Microsoft YaHei",sans-serif;
    --display:"PingFang SC",-apple-system,system-ui,"Helvetica Neue",sans-serif;
    --shadow:0 1px 2px rgba(58,51,64,.04),0 4px 16px rgba(58,51,64,.06);
    --shadow-hero:0 6px 24px rgba(58,51,64,.18);
  }
  *{box-sizing:border-box;margin:0;padding:0}
  body{font-family:var(--font);background:var(--bg);color:var(--t1);-webkit-font-smoothing:antialiased}
  .num{font-family:var(--display);font-variant-numeric:tabular-nums;font-feature-settings:"tnum";letter-spacing:0}
  .ic{width:1em;height:1em;display:inline-block;vertical-align:-0.15em;flex:none;stroke:currentColor;fill:none}
  /* header */
  .hd{background:var(--purple);color:#fff;padding:18px 24px}
  .hd .row{max-width:1180px;margin:0 auto;display:flex;align-items:center;gap:14px}
  .hd .ttl{flex:0 1 auto;min-width:0}
  .brand-shell{height:28px;display:flex;align-items:center;justify-content:center;flex:0 0 auto}
  .brand-logo{height:27px;width:auto;display:block;filter:brightness(0) invert(1)}
  .brand-mark{width:28px;height:28px;border-radius:8px;background:var(--green);color:#fff;
    display:none;align-items:center;justify-content:center;font:800 12px var(--display);letter-spacing:0}
  .hd .t{font-size:16px;font-weight:600;letter-spacing:.2px}
  .hd .s{font-size:12px;color:rgba(255,255,255,.6);margin-top:3px;line-height:1.5}
  .hd .right{margin-left:auto;display:flex;align-items:center;gap:10px}
  .btn{height:32px;padding:0 14px;border:0;border-radius:999px;background:var(--green);color:#fff;font:600 13px var(--font);cursor:pointer}
  .upd{font-size:11px;color:rgba(255,255,255,.55)}
  .wrap{max-width:1180px;margin:0 auto;padding:0 24px 60px}
  /* kpi */
  .kpis{display:grid;grid-template-columns:repeat(4,1fr);gap:14px;margin-top:24px}
  .kpi{background:#fff;border-radius:14px;padding:22px 22px 20px;box-shadow:var(--shadow);transition:transform .18s ease,box-shadow .18s ease}
  .kpi:hover{transform:translateY(-2px);box-shadow:0 4px 10px rgba(58,51,64,.07),0 10px 28px rgba(58,51,64,.10)}
  .kpi .v{font-family:var(--display);font-weight:800;font-size:32px;line-height:1;color:var(--ink);font-variant-numeric:tabular-nums;letter-spacing:-.5px}
  .kpi .k{font-size:12px;color:var(--t3);margin-top:9px}
  .kpi.hero{background:var(--purple);box-shadow:var(--shadow-hero)} .kpi.hero .v{color:#fff} .kpi.hero .k{color:rgba(255,255,255,.62)}
  .kpi.hero:hover{box-shadow:0 8px 30px rgba(58,51,64,.24)}
  /* tabs */
  .tabs{display:flex;gap:8px;margin:32px 0 16px;flex-wrap:wrap}
  .tab{height:36px;padding:0 16px;border:0;border-radius:999px;background:#fff;color:var(--t2);font:600 14px var(--font);cursor:pointer;display:inline-flex;align-items:center;gap:6px}
  .tab .ic{width:15px;height:15px}
  .tab i{font-size:15px;color:var(--t4)}
  .tab{box-shadow:var(--shadow);transition:background .15s ease,color .15s ease,transform .15s ease}
  .tab:hover{transform:translateY(-1px);color:var(--t1)}
  .tab.on{background:var(--green);color:#fff;box-shadow:0 2px 8px rgba(36,199,137,.30)}
  .tab.on:hover{color:#fff}
  .tab.on i{color:#fff}
  .hdrange{display:flex;align-items:center;gap:7px;margin-left:auto;flex-wrap:nowrap}
  .ranges{display:flex;gap:8px;align-items:center;flex-wrap:wrap;max-width:1100px;margin:12px auto 0}
  .rg{height:32px;padding:0 13px;border:0;border-radius:999px;background:rgba(255,255,255,.14);color:#fff;font:600 13px var(--font);cursor:pointer;white-space:nowrap;flex:0 0 auto;transition:background .15s}
  .rg:hover{background:rgba(255,255,255,.24)}
  .rg.on,.rg.solid{background:var(--green);color:#fff}
  .rg.on:hover,.rg.solid:hover{background:#1fb87d}
  /* 日期框美化:更大点击区、柔和边框、整框可点弹日历(配 onclick showPicker) */
  .dt{height:32px;border:1px solid rgba(255,255,255,.28);border-radius:8px;padding:0 10px;font:600 13px var(--font);color:var(--ink);background:#fff;cursor:pointer;flex:0 0 auto;font-variant-numeric:tabular-nums;transition:border-color .15s,box-shadow .15s}
  .dt:hover{border-color:var(--green)}
  .dt:focus{outline:none;border-color:var(--green);box-shadow:0 0 0 3px rgba(36,199,137,.25)}
  .dt::-webkit-calendar-picker-indicator{cursor:pointer;opacity:.55;padding:2px;transition:opacity .15s}
  .dt::-webkit-calendar-picker-indicator:hover{opacity:.9}
  .rglab{font:600 13px var(--font);color:rgba(255,255,255,.9);white-space:nowrap;flex:0 0 auto}
  .rgsep{font:400 12px var(--font);color:rgba(255,255,255,.55);flex:0 0 auto}
  .rgcur{margin-left:auto;font:600 12px var(--font);color:#7CF0C0}
  /* list */
  .card{background:#fff;border-radius:14px;padding:6px 24px;box-shadow:var(--shadow)}
  .r{display:flex;align-items:center;gap:14px;padding:15px 0;border-bottom:1px solid var(--div);transition:background .12s ease}
  .r:last-child{border-bottom:0}
  .r:hover{background:var(--bg2)}
  .rk{font-family:var(--display);font-weight:800;font-size:16px;color:#CCC;width:22px;text-align:center;flex:0 0 auto;font-variant-numeric:tabular-nums}
  .rk.first{color:var(--green)}
  /* 部门树:展开三角 + 缩进 */
  .tw{display:flex;align-items:center;justify-content:center;width:18px;height:18px;flex:0 0 auto;
    border-radius:5px;color:var(--t3);cursor:pointer;font-size:11px;line-height:1;user-select:none;transition:background .12s ease,color .12s ease}
  .tw:hover{background:var(--div);color:var(--t1)}
  .tw.leaf{cursor:default;visibility:hidden}
  .tw-pad{flex:0 0 auto}
  .av{width:36px;height:36px;border-radius:999px;flex:0 0 auto;object-fit:cover;background:var(--div)}
  .av.fb{display:flex;align-items:center;justify-content:center;background:var(--purple);color:#fff;font-weight:600;font-size:13px}
  .nm{font-weight:500;font-size:15px;color:var(--ink);flex:0 0 300px;overflow:hidden}
  .nm .sub{font-weight:400;font-size:12px;color:var(--t3);margin-top:2px;line-height:1.3}
  .tag-m{display:inline-block;margin-left:6px;padding:1px 7px;border-radius:999px;background:#FFF4E5;color:#B8742A;font:600 10.5px var(--font);vertical-align:middle}
  .tag-off{display:inline-block;margin-left:6px;padding:1px 7px;border-radius:999px;background:#EEE;color:#888;font:600 10.5px var(--font);vertical-align:middle}
  .sub-badge{display:inline-block;position:relative;margin-left:6px;padding:1px 7px;border-radius:999px;background:#F4F6F8;color:var(--t2);font:600 10.5px var(--font);vertical-align:middle}
  .sub-badge.premium{background:#FFF4E5;color:#B8742A;border:1px solid rgba(184,116,42,.22)}
  .sub-logo{display:inline-flex;position:relative;align-items:center;justify-content:center;width:16px;height:16px;margin-left:6px;border-radius:999px;vertical-align:middle;line-height:0;white-space:nowrap}
  .sub-logo svg{display:block}
  .sub-logo.premium{background:rgba(229,177,0,.10);box-shadow:0 0 0 1px rgba(229,177,0,.55),0 0 0 3px rgba(229,177,0,.16)}
  .sub-logo.ended,.sub-badge.ended{filter:grayscale(1);opacity:.45}
  .sub-logo.ended::before,.sub-badge.ended::before{content:'';position:absolute;inset:0;border-radius:999px;border:1px solid rgba(92,99,112,.22);pointer-events:none}
  .sub-logo.ended::after,.sub-badge.ended::after{content:'';position:absolute;left:2px;right:2px;top:50%;height:1.5px;background:rgba(92,99,112,.68);border-radius:999px;transform:rotate(-18deg);pointer-events:none}
  /* metric (总量/日均) segmented control, sits right of tabs row */
  .seg-ctl{display:inline-flex;margin-left:auto;background:#fff;border-radius:999px;padding:3px;gap:2px;align-items:center}
  .seg-ctl button{height:30px;padding:0 14px;border:0;border-radius:999px;background:transparent;color:var(--t2);font:600 13px var(--font);cursor:pointer}
  .seg-ctl button.on{background:var(--green);color:#fff}
  .track{flex:1;height:8px;border-radius:999px;background:var(--div);overflow:hidden;min-width:60px}
  .fill{height:8px;border-radius:999px;background:var(--green)}
  .fill.stacked{display:flex}
  .seg{height:8px;display:inline-block}
  .legend{display:flex;gap:16px;flex-wrap:wrap;margin:0 0 12px 4px}
  .lg{display:flex;align-items:center;gap:6px;font:500 12px var(--font);color:var(--t2)}
  .lg i{width:10px;height:10px;border-radius:2px;display:inline-block}
  .val{flex:0 0 180px;text-align:right}
  .val .t{font-weight:700;font-size:15px;color:var(--ink)}
  .val .s{font-size:11px;color:var(--t3);margin-top:2px;white-space:nowrap}
  .empty{padding:48px 0;text-align:center;color:var(--t3);font-size:14px}
  .foot{margin-top:28px;text-align:center;font-size:11px;color:var(--t3);line-height:1.6}
  /* governance metrics */
  .gov-head{display:flex;justify-content:space-between;gap:16px;align-items:flex-start;margin:8px 0 18px}
  .gov-title{font:700 18px/1.3 var(--font);color:var(--ink)}
  .gov-note{font:400 12px/1.6 var(--font);color:var(--t3);max-width:660px;margin-top:6px}
  .gov-pill{height:28px;padding:0 10px;border-radius:999px;background:var(--green-soft);color:#0B8D60;
    display:inline-flex;align-items:center;font:700 12px var(--font);white-space:nowrap}
  .gov-grid{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:12px}
  .gov-card{border:1px solid var(--div);border-radius:8px;padding:16px;background:#fff}
  .gov-card .top{display:flex;justify-content:space-between;gap:10px;align-items:flex-start}
  .gov-card .label{font:700 15px/1.3 var(--font);color:var(--ink)}
  .gov-card .family{font:500 11px/1.2 var(--font);color:var(--t3);margin-bottom:5px;text-transform:uppercase}
  .gov-card .value{font:800 22px/1 var(--display);color:var(--purple);white-space:nowrap}
  .gov-card .status{display:inline-flex;align-items:center;height:22px;border-radius:999px;padding:0 8px;
    background:var(--bg2);color:var(--t2);font:700 11px var(--font);margin-top:10px}
  .gov-card .detail{font:400 12px/1.6 var(--font);color:var(--t2);margin-top:12px}
  .gov-card .bench{font:500 11px/1.5 var(--font);color:var(--t3);margin-top:10px}
  /* 飞书 AI 权益:额度盘 + 单位说明。复用 .card/.r/.track/.num,保持 Keep 扁平风。 */
  .fs-quota{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:12px;padding:18px 0 8px}
  .fs-q{border:1px solid var(--div);border-radius:8px;padding:14px 16px}
  .fs-q-top{display:flex;justify-content:space-between;align-items:baseline;gap:10px}
  .fs-q-name{font:600 14px var(--font);color:var(--ink)}
  .fs-q-rem{font-family:var(--display);font-weight:800;font-size:15px;color:var(--green);font-variant-numeric:tabular-nums}
  .fs-q .track{margin:11px 0 8px;flex:none}
  .fs-q-sub{font:500 12px var(--font);color:var(--t3);font-variant-numeric:tabular-nums}
  .fs-sec-t{display:flex;align-items:baseline;gap:10px;font:700 14px var(--font);color:var(--t2);padding:18px 0 6px;border-top:1px solid var(--div);margin-top:10px}
  .fs-sec-t .fs-per{font:500 12px var(--font);color:var(--t3)}
  .fs-unit{font:500 12px var(--font);color:var(--t3);padding:4px 0 0}
  /* 自定义 Keep 区间日历 */
  .dwrap{position:relative;display:inline-flex}
  .dtrig{height:32px;padding:0 10px;border:1px solid rgba(255,255,255,.28);border-radius:8px;background:#fff;color:var(--ink);font:600 13px var(--font);cursor:pointer;display:inline-flex;align-items:center;gap:6px;font-variant-numeric:tabular-nums;transition:border-color .15s}
  .dtrig:hover{border-color:var(--green)}
  .dtrig .ic{width:14px;height:14px;color:var(--t3)}
  .dtrig .caret{width:13px;height:13px;margin-left:1px}
  .dpop{position:absolute;top:calc(100% + 8px);left:0;z-index:60;width:294px;background:#fff;border-radius:12px;
    box-shadow:0 8px 30px rgba(58,51,64,.20);padding:14px;display:none}
  .dpop.on{display:block}
  .dpop-hd{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px}
  .dpop-mon{font:700 14px var(--font);color:var(--ink)}
  .dpop-nav{display:flex;gap:4px}
  .dpop-nav button{width:28px;height:28px;border:0;border-radius:8px;background:var(--bg);color:var(--t2);cursor:pointer;font:600 16px var(--font);line-height:1;display:flex;align-items:center;justify-content:center;transition:background .12s,color .12s}
  .dpop-nav button:hover{background:var(--div);color:var(--ink)}
  .dpop-wk{display:grid;grid-template-columns:repeat(7,1fr)}
  .dpop-wk span{text-align:center;font:500 11px var(--font);color:var(--t3);height:26px;line-height:26px}
  .dpop-grid{display:grid;grid-template-columns:repeat(7,1fr)}
  .dpop-d{height:34px;display:flex;align-items:center;justify-content:center;font:500 13px var(--font);color:var(--t1);cursor:pointer;font-variant-numeric:tabular-nums;border-radius:8px}
  .dpop-d:hover{background:var(--green-soft);color:#0B8D60}
  .dpop-d.mute{color:var(--t4);cursor:default}
  .dpop-d.mute:hover{background:transparent;color:var(--t4)}
  .dpop-d.today{box-shadow:inset 0 0 0 1px var(--green-bd)}
  .dpop-d.inrange{background:var(--green-soft);border-radius:0;color:#0B8D60}
  .dpop-d.start,.dpop-d.end{background:var(--green);color:#fff;font-weight:700}
  .dpop-d.start{border-radius:8px 0 0 8px}
  .dpop-d.end{border-radius:0 8px 8px 0}
  .dpop-d.start.end{border-radius:8px}
  .dpop-d.start:hover,.dpop-d.end:hover{background:var(--green);color:#fff}
  .dpop-ft{display:flex;gap:6px;flex-wrap:wrap;margin-top:10px;padding-top:10px;border-top:1px solid var(--div)}
  .dpop-ft button{height:28px;padding:0 11px;border:0;border-radius:999px;background:var(--bg);color:var(--t2);font:600 12px var(--font);cursor:pointer;transition:background .12s,color .12s}
  .dpop-ft button:hover{background:var(--green-soft);color:#0B8D60}
  .dpop-ft button.on{background:var(--green);color:#fff}
  @media (max-width:760px){
    .fs-quota{grid-template-columns:1fr}
    .hd .row{align-items:flex-start;flex-wrap:wrap}
    .hdrange{margin-left:0;flex-wrap:wrap}
    .kpis{grid-template-columns:repeat(2,1fr)}
    .gov-head{display:block}
    .gov-pill{margin-top:12px}
    .gov-grid{grid-template-columns:1fr}
    .nm{flex:1 1 160px}
    .val{flex:0 0 120px}
  }
</style>
</head>
<body>
  <div class="hd">
    <div class="row">
      <div class="brand-shell">
        <img class="brand-logo" src="/assets/company-logo.svg" alt="Logo" onerror="this.style.display='none';this.nextElementSibling.style.display='flex'">
        <div class="brand-mark" aria-label="Logo">ET</div>
      </div>
      <div class="ttl"><div class="t">AI 编程 Token 看板</div><div class="s" id="sub">tokscale 采集 · MDM 身份 · 实时</div></div>
      <div class="hdrange">
        <span class="rglab">时间范围</span>
        <span class="dwrap">
          <button class="dtrig" id="rangeTrig"><svg class="ic" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><rect x="3" y="4" width="18" height="18" rx="2"/><path d="M16 2v4M8 2v4M3 10h18"/></svg><span id="rangeLbl">选择日期</span><svg class="ic caret" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><polyline points="6 9 12 15 18 9"/></svg></button>
          <input type="hidden" id="from"><input type="hidden" id="to">
          <div class="dpop" id="rangePop"></div>
        </span>
        <button class="rg solid" id="apply">应用</button>
        <button class="rg" id="reset">全部</button>
        <button class="rg" id="depToggle" title="把已离职的人也纳入榜单">显示离职</button>
        <a class="rg" href="/help" title="数据来源 / 刷新周期 / 手工补报" style="text-decoration:none;display:inline-flex;align-items:center;gap:5px"><svg class="ic" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><ellipse cx="12" cy="5" rx="9" ry="3"/><path d="M3 5V19A9 3 0 0 0 21 19V5"/><path d="M3 12A9 3 0 0 0 21 12"/></svg>数据说明</a>
      </div>
    </div>
  </div>

  <div class="wrap">
    <div class="kpis">
      <div class="kpi hero"><div class="v num" id="k-tok">—</div><div class="k">亿 Tokens · 累计</div></div>
      <div class="kpi"><div class="v num" id="k-cost">—</div><div class="k">公司实付（美元）</div></div>
      <div class="kpi"><div class="v num" id="k-msg">—</div><div class="k">总消息</div></div>
      <div class="kpi"><div class="v num" id="k-ppl">—</div><div class="k">已接入人数</div></div>
    </div>

    <div class="tabs">
      <button class="tab on" data-t="person"><svg class="ic" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M6 9H4.5a2.5 2.5 0 0 1 0-5H6"/><path d="M18 9h1.5a2.5 2.5 0 0 0 0-5H18"/><path d="M4 22h16"/><path d="M10 14.66V17c0 .55-.47.98-.97 1.21C7.85 18.75 7 20.24 7 22"/><path d="M14 14.66V17c0 .55.47.98.97 1.21C16.15 18.75 17 20.24 17 22"/><path d="M18 2H6v7a6 6 0 0 0 12 0V2Z"/></svg>个人榜</button>
      <button class="tab" data-t="team"><svg class="ic" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><ellipse cx="12" cy="5" rx="9" ry="3"/><path d="M3 5V19A9 3 0 0 0 21 19V5"/><path d="M3 12A9 3 0 0 0 21 12"/></svg>部门榜</button>
      <button class="tab" data-t="tool"><svg class="ic" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M3 3v18h18"/><path d="M18 17V9"/><path d="M13 17V5"/><path d="M8 17v-3"/></svg>工具榜</button>

function subLogoHtml(s){

  var title=titleCaseWord(tool)+' '+titleCaseWord(tier), start=s.start?String(s.start):'', end=s.end?String(s.end):'';
  var ended=!!end, tip=title+' · '+seatText+'$'+(Number(s.fee)||0)+'/月';
  if(ended) tip=title+' · $'+(Number(s.fee)||0)+'/月 · '+(start||'?')+' ~ '+end+' 已删除';
  else if(start) tip+=' · 自 '+start;
  var cls=(tier==='premium'?' premium':'')+(ended?' ended':'');
  if(!logo){
    // Unknown tool falls back to the old text pill so badges never disappear silently.
    return '<span class="sub-badge'+cls+'" title="'+esc(tip)+'">'+esc(tool)+'</span>';
  }
  var color=(tool==='claude' && tier==='premium') ? '#E5B100' : logo.color;
  return '<span class="sub-logo'+cls+'" style="color:'+color+'" title="'+esc(tip)+'"><svg viewBox="0 0 24 24" width="15" height="15" aria-hidden="true"><path d="'+logo.path+'" fill="currentColor"/></svg></span>';
}

async function fillMeta(){
  if(META_DONE) return; META_DONE=true;

    var m=await j('/v1/meta');
    if(m && m.min_date){ META_MIN=m.min_date; META_MAX=m.max_date; }   // 存全局供算天数
    if(m && m.min_date && !$('from').value && !$('to').value){
      $('from').value=m.min_date; $('to').value=m.max_date;
    }
    var sub=$('sub');
    if(sub && m && m.min_date){
      var lr=m.last_report ? ('最后上报 '+m.last_report.slice(0,16).replace('T',' ')) : '';

}

// 部门榜:把扁平的 dept/depth 节点(后端已 roll-up)建成可折叠下钻树。
// 名称只显示路径最后一段,层级靠缩进;主指标=人均(tokens/people,叠加日均口径);
// 副标题=活跃率;右侧=总量/成本/占比 参考。默认展开到 depth<=1,重渲染保持展开状态。
function lastSeg(p){p=p||''; var i=p.lastIndexOf('/'); return i<0?p:p.slice(i+1);}
function renderTeamTree(){
  var nodes=CACHE.team||[];
  if(!nodes.length){$('list').innerHTML='<div class="empty">暂无数据 — 等采集端上报后自动出现</div>';return;}
  // 1) 建索引 + 父子关系(父 = 去掉最后一段)。dept 是完整路径,depth=路径中 "/" 数量。
  var byPath={}, children={};
  nodes.forEach(function(n){ byPath[n.dept]=n; });
  nodes.forEach(function(n){
    var d=n.dept||'', i=d.lastIndexOf('/'), parent=(i<0?null:d.slice(0,i));
    // 只有当父节点真实存在于数据里才挂为子节点,否则视为(本层的)根
    if(parent!=null && byPath[parent]){ (children[parent]=children[parent]||[]).push(n); }
    else { (children['__root__']=children['__root__']||[]).push(n); }
  });
  // 每层内按 tokens 倒序;但「外部合作商」恒置末尾(外包供应商,不与真实部门比排名)
  var isExt=function(d){ return (d||'').split('/').pop()==='外部合作商'; };
  Object.keys(children).forEach(function(k){ children[k].sort(function(a,b){
    var ea=isExt(a.dept), eb=isExt(b.dept);
    if(ea!==eb) return ea?1:-1;                       // 外部合作商沉底
    return (b.tokens||0)-(a.tokens||0);
  }); });

  // 2) 首次按 depth<=1 默认展开(Keep 根 + 一级事业部),但「外部合作商」默认收起;之后保持用户状态
  if(TEAM_EXPANDED===null){
    TEAM_EXPANDED=new Set();
    nodes.forEach(function(n){ if((n.depth||0)<=1 && !isExt(n.dept)) TEAM_EXPANDED.add(n.dept); });
  }

  // 3) 主指标口径与占比:人均 token=tokens/token_people(只算用编程工具的人,不被 aily-only 稀释),
  //    再叠加日均;占比按全体节点人均之和(参考量)。活跃人数 people=token∪aily(供活跃渗透)。
  var mv=function(x){
    var pc=(x.per_capita_tokens!=null)?x.per_capita_tokens
          :((x.tokens||0)/(((x.token_people||x.people||0))||1));
    return metricTok(pc);
  };
  var allVals=nodes.map(mv).concat([1]);
  var max=Math.max.apply(null,allVals);
  var tot=nodes.reduce(function(a,x){return a+mv(x)},0);

  // 4) 递归渲染:从 __root__ 出发,深度优先,按缩进逐级展示
  var html=[];
  var walk=function(list, depth){
    list.forEach(function(x){
      var kids=children[x.dept]||[];
      var hasKids=kids.length>0;
      var open=TEAM_EXPANDED.has(x.dept);
      var tri=hasKids?(open?'▾':'▸'):'';
      var twCls='tw'+(hasKids?'':' leaf');
      var name=lastSeg(x.dept)||'—';
      var sub;
      if(x.headcount!=null){
        var ar=(x.active_rate!=null)?(' · '+x.active_rate+'%'):'';
        sub='活跃 '+(x.people||0)+'/'+x.headcount+ar;
      } else { sub='使用 '+(x.people||0)+' 人'; }
      var pct=Math.max(2,mv(x)/max*100), share=tot?(mv(x)/tot*100):0;
      var big=compact(mv(x))+'/人';
      // 人均点数(飞书 aily,单位「点」)与 token 分列,不加总;只在该部门有 aily 用量时显示
      var creditTag=(x.per_capita_credits>0)?(' · 人均 '+compact(x.per_capita_credits)+' 点'):'';
      var small='总 '+compact(metricTok(x.tokens||0))+' · $'+grp(Math.round(x.cost||0))+' · '+share.toFixed(1)+'%'+creditTag;
      var pad=depth*18;                                 // 每级缩进 18px,层级靠缩进体现
      // 有子节点的行:整行可点(data-path + 手型光标),点哪都展开/收起,不必精准点三角
      var rowAttr=hasKids?(' data-path="'+encodeURIComponent(x.dept)+'" style="cursor:pointer"'):'';
      html.push('<div class="r" data-depth="'+depth+'"'+rowAttr+'>'+
        '<span class="tw-pad" style="width:'+pad+'px"></span>'+
        '<span class="'+twCls+'">'+tri+'</span>'+
        '<div class="nm">'+name+'<div class="sub">'+sub+'</div></div>'+
        '<div class="track"><div class="fill" style="width:'+pct+'%"></div></div>'+
        '<div class="val"><div class="t num">'+big+'</div><div class="s num">'+small+'</div></div></div>');
      if(hasKids && open) walk(kids, depth+1);           // 展开才下钻直接子节点
    });
  };
  // 去掉最前面的一级 'Keep' 根:若顶层只有 Keep,直接从它的子节点(一级事业部/线)起树
  var roots = children['__root__']||[];
  if(roots.length===1 && roots[0].dept==='Keep') roots = children['Keep']||[];
  walk(roots, 0);
  $('list').innerHTML=html.join('');
  // 绑定整行点击:切换该 path 的展开状态后保持状态重渲染(行是扁平兄弟节点,无嵌套冒泡)
  $('list').querySelectorAll('.r[data-path]').forEach(function(t){
    t.onclick=function(){
      var p=decodeURIComponent(t.getAttribute('data-path'));
      if(TEAM_EXPANDED.has(p)) TEAM_EXPANDED.delete(p); else TEAM_EXPANDED.add(p);
      renderTeamTree();
    };
  });
}

  var y=DP_VIEW.getFullYear(), m=DP_VIEW.getMonth();
  var startWd=new Date(y,m,1).getDay(), dim=new Date(y,m+1,0).getDate(), prev=new Date(y,m,0).getDate();
  var today=new Date(); today.setHours(0,0,0,0);
  var cells=[],i,dd;
  for(i=startWd-1;i>=0;i--) cells.push({d:new Date(y,m-1,prev-i),mute:1});
  for(dd=1;dd<=dim;dd++) cells.push({d:new Date(y,m,dd),mute:0});
  while(cells.length%7) cells.push({d:new Date(y,m+1,cells.length-dim-startWd+1),mute:1});
  var wk=['日','一','二','三','四','五','六'].map(function(w){return '<span>'+w+'</span>';}).join('');
  var grid=cells.map(function(c){
    var d=c.d; d.setHours(0,0,0,0);
    var cls='dpop-d'+(c.mute?' mute':'');
    if(dpSame(d,today))cls+=' today';
    if(DP_S&&DP_E&&d>=DP_S&&d<=DP_E)cls+=' inrange';
    if(dpSame(d,DP_S))cls+=' start'; if(dpSame(d,DP_E))cls+=' end';
    if(DP_S&&!DP_E&&dpSame(d,DP_S))cls+=' start end';
    return '<div class="'+cls+'" data-d="'+fmtDate(d)+'">'+d.getDate()+'</div>';
  }).join('');
  $('rangePop').innerHTML='<div class="dpop-hd"><span class="dpop-mon">'+y+'年'+(m+1)+'月</span>'+
    '<span class="dpop-nav"><button data-n="-1">‹</button><button data-n="1">›</button></span></div>'+
    '<div class="dpop-wk">'+wk+'</div><div class="dpop-grid">'+grid+'</div>'+
    '<div class="dpop-ft"><button data-q="0">今天</button><button data-q="1">昨天</button>'+
    '<button data-q="d7">近 7 天</button><button data-q="d30">近 30 天</button><button data-q="d90">近 90 天</button></div>';
  $('rangePop').querySelectorAll('.dpop-nav button').forEach(function(b){
    b.onclick=function(ev){ev.stopPropagation();DP_VIEW.setMonth(DP_VIEW.getMonth()+(+b.getAttribute('data-n')));dpRender();};});
  $('rangePop').querySelectorAll('.dpop-d:not(.mute)').forEach(function(el){
    el.onclick=function(ev){ev.stopPropagation();dpPick(dpParse(el.getAttribute('data-d')));};});
  $('rangePop').querySelectorAll('.dpop-ft button').forEach(function(b){
    b.onclick=function(ev){ev.stopPropagation();var q=b.getAttribute('data-q');
      if(q==='0'||q==='1'){presetSingle(+q);}else{presetDays(+q.slice(1));}
      markRange(null);dpClose();};});
}
function dpPick(d){
  if(!DP_S||(DP_S&&DP_E)){DP_S=d;DP_E=null;dpRender();}        // 起点(或重选)
  else{ if(d<DP_S){DP_E=DP_S;DP_S=d;}else DP_E=d;               // 终点(自动纠正先后)
    $('from').value=fmtDate(DP_S);$('to').value=fmtDate(DP_E);
    updTrig();markRange(null);applyRange();dpClose();}
}
$('rangeTrig').onclick=function(e){e.stopPropagation();$('rangePop').classList.contains('on')?dpClose():dpOpen();};
document.addEventListener('click',function(e){var w=$('rangePop'),t=$('rangeTrig');if(w&&!w.contains(e.target)&&!t.contains(e.target))dpClose();});
load();                     // load() 内部已 await fillMeta(),meta 就绪后再发榜单请求
setInterval(load, 30000);   // 30s 自动刷新
</script>
</body>
</html>
