# tokscale.example.com —— AI 编程 Token 看板反向代理
# 部署于 collector.example.com(现成 nginx 1.20.1)
# 上游:本机 collector(dev_collector.py)127.0.0.1:8090
# 证书:复用服务器上已有的 example.com 通配证书
# 放置:/etc/nginx/conf.d/tokscale.example.com.conf  →  sudo nginx -t && sudo nginx -s reload

server {
    listen 80;
    listen [::]:80;
    server_name tokscale.example.com;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    listen [::]:443 ssl;
    server_name tokscale.example.com;

    ssl_certificate     /etc/nginx/ssl/example/fullchain.pem;
    ssl_certificate_key /etc/nginx/ssl/example/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;

    # tokscale graph 日数据上报体可达上百 KB,放宽到 20M
    client_max_body_size 20M;

    access_log /var/log/nginx/tokscale.access.log;
    error_log  /var/log/nginx/tokscale.error.log;

    location / {
        proxy_pass http://127.0.0.1:8090;
        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 120s;
    }
}
